---
- name: Install NFS client
  apt:
    name: nfs-common
    state: present

- name: Create mount points
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /mnt/store/code
    - /mnt/store/models
    - /mnt/store/data
    - /mnt/store/users
    - /mnt/store/media

- name: Mount TrueNAS NFS shares
  mount:
    path: "{{ item.path }}"
    src: "192.168.88.13:{{ item.share }}"
    fstype: nfs
    opts: defaults,_netdev
    state: mounted
  loop:
    - { path: /mnt/store/code,   share: /mnt/pool/code }
    - { path: /mnt/store/models, share: /mnt/pool/models }
    - { path: /mnt/store/data,   share: /mnt/pool/data }
    - { path: /mnt/store/users,  share: /mnt/pool/users }
    - { path: /mnt/store/media,  share: /mnt/pool/media }
