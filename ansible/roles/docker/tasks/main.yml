---
- name: Install Docker
  apt:
    name: [docker.io, docker-compose-plugin, python3-docker]
    state: present
    update_cache: true

- name: Enable Docker
  systemd:
    name: docker
    enabled: true
    state: started

- name: Add plabs user to docker group
  user:
    name: plabs
    groups: docker
    append: true
