---
# Proxmox host config — runs directly on the Proxmox node
# Handles: repos, IOMMU, VFIO, NVIDIA blacklist, NUMA tuning

- name: Disable enterprise repo
  replace:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    regexp: '^deb'
    replace: '# deb'

- name: Add no-subscription repo
  copy:
    dest: /etc/apt/sources.list.d/pve-no-sub.list
    content: "deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription\n"

- name: Update apt
  apt:
    update_cache: true

- name: Install tools
  apt:
    name: [git, ansible, python3, numactl, numad, pciutils, htop, nvme-cli]
    state: present

- name: Enable NUMA daemon
  systemd:
    name: numad
    enabled: true
    state: started

- name: Enable Intel IOMMU in GRUB
  replace:
    path: /etc/default/grub
    regexp: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet"'
    replace: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet intel_iommu=on iommu=pt"'
  notify: update grub

- name: Load VFIO modules
  blockinfile:
    path: /etc/modules
    block: |
      vfio
      vfio_iommu_type1
      vfio_pci

- name: Blacklist NVIDIA on host (GPUs belong to VMs)
  copy:
    dest: /etc/modprobe.d/blacklist-nvidia.conf
    content: |
      blacklist nouveau
      blacklist nvidia
      blacklist nvidiafb
  notify: update initramfs

handlers:
  - name: update grub
    command: update-grub

  - name: update initramfs
    command: update-initramfs -u -k all
